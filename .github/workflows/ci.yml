name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel an in-flight CI run if the PR gets a new push.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test (gcc-13, Ubuntu 24.04)
    runs-on: ubuntu-24.04
    env:
      CC: gcc-13
      CXX: g++-13

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qt6-base-dev qt6-base-dev-tools \
            libqt6opengl6-dev libqt6openglwidgets6 \
            libeigen3-dev libsuitesparse-dev libcgal-dev \
            libspdlog-dev libcli11-dev libboost-dev \
            ninja-build cmake catch2

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCIRCUITCORE_BUILD_MPKIT_WIDGETS=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --parallel
